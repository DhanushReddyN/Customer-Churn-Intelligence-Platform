version: "3.9"

services:

  backend:

    build: .

    ports:
      - "8000:8000"

    container_name: churn_backend

  frontend:

    image: python:3.11-slim

    working_dir: /app

    volumes:
      - .:/app

    command: >
      sh -c "pip install -r requirements.txt &&
             streamlit run frontend/streamlit_app.py
             --server.address=0.0.0.0
             --server.port=8501"

    ports:
      - "8501:8501"

    depends_on:
      - backend